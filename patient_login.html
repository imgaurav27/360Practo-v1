<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Login Page</title>
</head>
<body>
    <form name="login" method="post">
        <table align="center" cellpadding="5px" cellspacing="5px">
            <caption>
                <h1> Patient Login form </h1>
            </caption>
            <!--For email uses input type Email-->
            <tr>
                <td>
                    <label for="id1"> Email :</label>
                </td>
                <td>
                    <input type="email" id="id1" name="name1" placeholder="abc@gmail.com">
                </td>
            </tr>
            <!--For password input type password-->
            <tr>
                <td>
                    <label for="id2">Password :</label>
                </td>
                <td>
                    <input type="password" id="id2" name="name2" placeholder="password">
                </td>
            </tr>
            <!--For checkbox input type checkbox-->
            <tr>
                <td>
                    <input type="checkbox" > Remember Me
                </td>
            </tr>
            <!--for Remember me input type submit-->
            <tr>
                <td>
                    <input type="submit" value="Login">
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>
