<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <center>
    <form>
        <table>
            <center>
            <th><b><h1> Doctor Registration Form :</h1></b> </th>
            </center>
            <!-- For name-->
            <tr>
                <td>
                    <label><b>Enter Your Full Name : </b></label>
                </td>
                <td>
                    <input type="text" placeholder="Enter Full Name">
                </td>
            </tr>
            <!--For Password-->
            <tr>
                <td>
                    <label><b> Enter Password :</b></label>
                </td>
                <td>
                    <input type="password" placeholder="Enter Password">
                </td>
            </tr>
            <!--For Email-->
            <tr>
                <td>
                    <label><b> Email :</b></label>
                </td>
                <td>
                    <input type="email" placeholder="Enter Email">
                </td>
            </tr>
            <!--For Phone number-->
            <tr>
                <td>
                    <label><b> Enter Phone Number</b></label>
                </td>
                <td>
                    <input type="number" placeholder="Enter Mo Number">
                </td>
            </tr>
            <!-- Using DropDown Specialization-->
            <tr>
                <td>
                    <label><b> Speciallization :</b></label>
                </td>
                <td>
                    <select>
                        <option value="cardiologists"> Cardiologists</option>
                        <option value="Neurologists"> Neurologists</option>
                        <option value="Orthopedic Surgeons"> Orthopedic Surgeons</option>
                        <option value="Pulmonologists"> Pulmonologists</option>
                    </select>
                </td>
            </tr>
            <!-- Experience in Years-->
             <tr>
                <td>
                    <label><b>Experience(Years) :</b></label>
                </td>
                <td>
                    <input type="number" placeholder="Enter Experience">
                </td>
             </tr>
             <!-- Select Gender using Radio button-->
            <tr>
              <td>
                <label><b>Select Gender :</b></label>
              </td>
              <td>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender"  value="Female"> Female
                <input type="radio"  name="gender" value="Others"> Others
              </td>
            </tr>
            <!--Available Days Using Checkbox-->
            <tr>
                <td>
                    <label><b> Available Days:</b></label>
                </td>
                <td>
                    <input type="checkbox" value="Monday">Monday
                    <input type="checkbox" value="Tuesday">Tuesday
                    <input type="checkbox" value="Wednesday"> Wednesday
                    <input type="checkbox" value="Thursday"> Thursday
                    <input type="checkbox" value="Friday"> Friday
                    <input type="checkbox" value="Saturday"> Saturday
                    <input type="checkbox" value="Sunday"> Sunday
                </td>
            </tr>
            <!-- Available time use input type=time-->
            <tr>
                <td>
                    <label><b> Available Time :</b></label>
                </td>
                <td>
                    <input type="time">
                </td>
            </tr>
            <!--Address Using Textarea-->
            <tr>
                <td>
                    <label><b>Enter Address :</b></label>
                </td>
                <td>
                    <textarea rows="5" cols="20" placeholder="Enter the Address"></textarea>
                </td>
            </tr>
            <!--Upload Certificate usig input type=File -->
            <tr>
                <td>
                    <label><b> Upload Certificate :</b></label>
                </td>
                <td>
                    <input type="File">
                </td>
            </tr>
            <!--Create a Register Button Using input=Register-->
            <tr>
                <td>
                    <input type="Submit" value="Register">
                </td>
                <td>
                    <input type="Reset" value="Clear">
                </td>
            </tr>
            

        </table>
    </form> 
    </center>
</body>
</html>
