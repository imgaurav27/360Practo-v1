<!DOCTYPE html>
<html lang="en">
<head>
    <title>Docter Regestration Page</title>
</head>
<body>
    <form>
        <table align="center" cellpadding="5px" cellspacing="5px">
            <caption><b><h1> Doctor Registration Form :</h1></b> </caption>
            <!-- For name-->
            <tr>
                <td>
                    <label for="id1"><b>Enter Your Full Name : </b></label>
                </td>
                <td>
                    <input type="text" id="id1" name="name1" placeholder="Enter Full Name">
                </td>
            </tr>
            <!--For Password-->
            <tr>
                <td>
                    <label for="id2"><b> Enter Password :</b></label>
                </td>
                <td>
                    <input type="password" id="id2" name="name2" placeholder="Enter Password">
                </td>
            </tr>
            <!--For Email-->
            <tr>
                <td>
                    <label for="id3"><b> Email :</b></label>
                </td>
                <td>
                    <input type="email"  id="id3" name="name3"  placeholder="Enter Email">
                </td>
            </tr>
            <!--For Phone number-->
            <tr>
                <td>
                    <label for="id4"><b> Enter Phone Number</b></label>
                </td>
                <td>
                    <input type="number" id="id4" name="name4"  placeholder="Enter Mo Number">
                </td>
            </tr>
            <!-- Using DropDown Specialization-->
            <tr>
                <td>
                    <label><b> Speciallization :</b></label>
                </td>
                <td>
                    <select>
                        <option value="cardiologists"> Cardiologists</option>
                        <option value="Neurologists"> Neurologists</option>
                        <option value="Orthopedic Surgeons"> Orthopedic Surgeons</option>
                        <option value="Pulmonologists"> Pulmonologists</option>
                    </select>
                </td>
            </tr>
            <!-- Experience in Years-->
             <tr>
                <td>
                    <label for="id5"><b>Experience(Years) :</b></label>
                </td>
                <td>
                    <input type="number" id="id5" name="name5"  placeholder="Enter Experience">
                </td>
             </tr>
             <!-- Select Gender using Radio button-->
            <tr>
              <td>
                <label><b>Select Gender :</b></label>
              </td>
              <td>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender"  value="Female"> Female
                <input type="radio"  name="gender" value="Others"> Others
              </td>
            </tr>
            <!--Available Days Using Checkbox-->
            <tr>
                <td>
                    <label><b> Available Days:</b></label>
                </td>
                <td>
                    <input type="checkbox" value="Monday">Monday
                    <input type="checkbox" value="Tuesday">Tuesday
                    <input type="checkbox" value="Wednesday"> Wednesday
                    <input type="checkbox" value="Thursday"> Thursday
                    <input type="checkbox" value="Friday"> Friday
                    <input type="checkbox" value="Saturday"> Saturday
                    <input type="checkbox" value="Sunday"> Sunday
                </td>
            </tr>
            <!-- Available time use input type=time-->
            <tr>
                <td>
                    <label for="id6"><b> Available Time :</b></label>
                </td>
                <td>
                    <input type="time" id="id6" name="name6" >
                </td>
            </tr>
            <!--Address Using Textarea-->
            <tr>
                <td>
                    <label for="id7"><b>Enter Address :</b></label>
                </td>
                <td>
                    <textarea rows="5" cols="20" id="id7" name="name7"  placeholder="Enter the Address"></textarea>
                </td>
            </tr>
            <!--Upload Certificate usig input type=File -->
            <tr>
                <td>
                    <label><b> Upload Certificate :</b></label>
                </td>
                <td>
                    <input type="File" >
                </td>
            </tr>
            <!--Create a Register Button Using input=Register-->
            <tr>
                <td>
                    <input type="Submit" value="Register">
                </td>
                <td>
                    <input type="Reset" value="Clear">
                </td>
            </tr>
            

        </table>
    </form> 
</body>
</html>
