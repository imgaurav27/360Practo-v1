<!DOCTYPE html>
<html lang="en">
<head>
    <title>Patient Regestration Page</title>
</head>
<body>
    <center>
    <form>
        <table>
            <center>
            <caption><b><h1> Patient Registration Form :</h1></b></caption>
            </center>
            <!-- Name using input type text-->
             <tr>
                <td>
                    <label for="id1"><b> Enter Full Name :</b></label>
                </td>
                <td>
                    <input type="text" id="id1" name="name1"  placeholder="Enter Full Name">
                </td>
             </tr>
             <!-- Password using input type Password-->
              <tr>
                <td>
                    <label for="id2"><b> Password :</b></label>
                </td>
                <td>
                    <input type="password" id="id2" name="name2"  placeholder="Password">
                </td>
              </tr>
              <!--Enter Email using input type Email-->
              <tr>
                <td>
                    <label for="id3"><b>Enter Email :</b></label>
                </td>
                <td>
                    <input type="email" id="id3" name="name3"  placeholder="abc@example.in"> 
                </td>
              </tr>
              <!--phone number using input type number-->
              <tr>
                <td>
                    <label for="id4"><b> Phone Number :</b></label>
                </td>
                <td>
                    <input type="number" id="id4" name="name4"  placeholder="1234567890">
                </td>
              </tr>
              <!--Date of Birth using  input type Date-->
              <tr>
                <td>
                    <label for="id5"><b>Date of Birth :</b></label>
                </td>
                <td>
                    <input type="Date" id="id5" name="name5" >
                </td>
              </tr>
              <!--Appointment date & time using input type datetime-local -->
              <tr>
                <td>
                    <label for="id6"><b>Appointment Date & Time :</b></label>
                </td>
                <td>
                    <input type="datetime-local" id="id6" name="name6"  value="datetime">
                </td>
              </tr>
              <!--Gender using input type Radio-->
              <tr>
                <td>
                    <label><b>Gender :</b></label>
                </td>
                <td>
                    <input type="radio" name="Gender" value="Male">Male
                    <input type="radio" name="Gender" value="Female">Female
                    <input type="radio" name="Gender" value="Others">Others
                </td>
              </tr>
              <!--Diseases Using checkbox-->
              <tr>
                <td>
                    <label><b> Diseases :</b></label>
                </td>
                <td>
                    <input type="checkbox" value="Diabetes"> Diabetes
                    <input type="checkbox" value="BP"> BP
                    <input type="checkbox" value="Heart Problem">Heart Problem
                </td>
              </tr>
              <!-- Blood Group using DropDown-->
               <tr>
                <td>
                    <label><b>Blood Group :</b></label>
                </td>
                <td>
                    <select>
                        <option value="A+"> A+ </option>
                        <option value="B+"> B+ </option>
                        <option value="AB+"> AB+ </option>
                        <option value="AB-"> AB- </option>
                        <option VAlue="O+"> O+ </option>
                    </select>
                </td>
               </tr>
               <!--Address using textarea-->
               <tr>
                <td>
                    <label for="id7"><b>Address :</b></label>
                </td>
               </tr>
               <tr>
                <td>
                    <textarea row="5" cols="20" id="id7" name="name7"  placeholder="Enter Address"></textarea>
                </td>
               </tr>
               <!--upload report using input type file-->
               <tr>
                <td>
                    <label><b> Upload Report :</b> </label>
                </td>
                <td>
                    <input type="file">
                </td>
               </tr>
               <!--create a Button Using input type Submit & Reset-->
               <tr>
                <td>
                    <input type="submit" value="Register">
                    <input type="Reset" value="Clear">
                </td>
               </tr>
        </table>
    </form>
    </center>
</body>
</html>
