<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <center>
    <form>
        <table>
            <center>
            <th><b><h1> Patient Registration Form :</h1></b> </th>
            </center>
            <!-- Name using input type text-->
             <tr>
                <td>
                    <label><b> Enter Full Name :</b></label>
                </td>
                <td>
                    <input type="text" placeholder="Enter Full Name">
                </td>
             </tr>
             <!-- Password using input type Password-->
              <tr>
                <td>
                    <label><b> Password :</b></label>
                </td>
                <td>
                    <input type="password" placeholder="Password">
                </td>
              </tr>
              <!--Enter Email using input type Email-->
              <tr>
                <td>
                    <label><b>Enter Email :</b></label>
                </td>
                <td>
                    <input type="email" placeholder="abc@example.in"> 
                </td>
              </tr>
              <!--phone number using input type number-->
              <tr>
                <td>
                    <label><b> Phone Number :</b></label>
                </td>
                <td>
                    <input type="number" placeholder="1234567890">
                </td>
              </tr>
              <!--Date of Birth using  input type Date-->
              <tr>
                <td>
                    <label><b>Date of Birth :</b></label>
                </td>
                <td>
                    <input type="Date">
                </td>
              </tr>
              <!--Appointment date & time using input type datetime-local -->
              <tr>
                <td>
                    <label><b>Appointment Date & Time :</b></label>
                </td>
                <td>
                    <input type="datetime-local" value="datetime">
                </td>
              </tr>
              <!--Gender using input type Radio-->
              <tr>
                <td>
                    <label><b>Gender :</b></label>
                </td>
                <td>
                    <input type="radio" name="Gender" value="Male">Male
                    <input type="radio" name="Gender" value="Female">Female
                    <input type="radio" name="Gender" value="Others">Others
                </td>
              </tr>
              <!--Diseases Using checkbox-->
              <tr>
                <td>
                    <label><b> Diseases :</b></label>
                </td>
                <td>
                    <input type="checkbox" value="Diabetes"> Diabetes
                    <input type="checkbox" value="BP"> BP
                    <input type="checkbox" value="Heart Problem">Heart Problem
                </td>
              </tr>
              <!-- Blood Group using DropDown-->
               <tr>
                <td>
                    <label><b>Blood Group :</b></label>
                </td>
                <td>
                    <select>
                        <option value="A+"> A+ </option>
                        <option value="B+"> B+ </option>
                        <option value="AB+"> AB+ </option>
                        <option value="AB-"> AB- </option>
                        <option VAlue="O+"> O+ </option>
                    </select>
                </td>
               </tr>
               <!--Address using textarea-->
               <tr>
                <td>
                    <label><b>Address :</b></label>
                </td>
               </tr>
               <tr>
                <td>
                    <textarea row="5" cols="20" placeholder="Enter Address"></textarea>
                </td>
               </tr>
               <!--upload report using input type file-->
               <tr>
                <td>
                    <label><b> Upload Report :</b> </label>
                </td>
                <td>
                    <input type="file">
                </td>
               </tr>
               <!--create a Button Using input type Submit & Reset-->
               <tr>
                <td>
                    <input type="submit" value="Register">
                    <input type="Reset" value="Clear">
                </td>
               </tr>
        </table>
    </form>
    </center>
</body>
</html>
